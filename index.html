<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaku Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 1rem;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    .container {
      background: white;
      border-radius: 8px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      min-width: 332px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid #ddd;
    }

    .tab-btn {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
      color: #666;
      font-weight: 500;
    }

    .tab-btn.active {
      color: #4a90d9;
      border-bottom-color: #4a90d9;
    }

    .tab-btn:hover:not(.active) {
      color: #333;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    /* Shared */
    .character-input {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .character-input input {
      flex: 1;
      min-width: 0;
      padding: 0.75rem;
      font-size: 1.5rem;
      border: 2px solid #ddd;
      border-radius: 4px;
      text-align: center;
    }

    .character-input button {
      padding: 0.75rem 1rem;
      font-size: 1rem;
      white-space: nowrap;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .character-input button:hover {
      background: #357abd;
    }

    .canvas-container {
      display: flex;
      justify-content: center;
      margin: 2rem 0;
      background: white;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .controls button {
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      background: #666;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .controls button:hover {
      background: #555;
    }

    .controls button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .status {
      text-align: center;
      margin-top: 1.5rem;
      color: #666;
      font-size: 0.9rem;
    }

    .status strong {
      color: #333;
    }

    .presets {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .presets button {
      padding: 0.5rem 0.75rem;
      font-size: 1.25rem;
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
    }

    .presets button:hover {
      background: #e0e0e0;
    }

    .error {
      color: #d32f2f;
      text-align: center;
      margin-top: 1rem;
    }

    .settings {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #eee;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .setting-row label {
      color: #666;
      font-size: 0.9rem;
      min-width: 120px;
      text-align: right;
    }

    .setting-row input[type="range"] {
      width: 150px;
    }

    .setting-row .value {
      min-width: 50px;
      font-weight: bold;
      color: #333;
    }

    .setting-row select {
      padding: 0.25rem 0.5rem;
      font-size: 0.9rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
    }

    @media (max-width: 500px) {
      .container {
        padding: 1rem;
      }

      .setting-row {
        flex-wrap: wrap;
        justify-content: flex-start;
      }

      .setting-row label {
        min-width: auto;
        text-align: left;
      }

      .character-input {
        gap: 0.5rem;
      }
    }

    h2 {
      color: #333;
      margin-top: 2rem;
      margin-bottom: 1rem;
      font-size: 1.25rem;
    }

    .diagram-container {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      padding: 1rem;
      background: white;
      border: 1px solid #eee;
      border-radius: 4px;
    }

    .diagram-container svg {
      border: 1px solid #eee;
      border-radius: 4px;
    }

    /* Practice tab */
    #canvas,
    #practice-canvas {
      position: relative;
      display: inline-block;
      border: 1px solid #ccc;
      -webkit-user-select: none;
      user-select: none;
    }

    .practice-feedback {
      text-align: center;
      margin-top: 1rem;
      font-size: 1.1rem;
      min-height: 1.5em;
    }

    .practice-feedback.accept {
      color: #2e7d32;
      font-weight: bold;
    }

    .practice-feedback.reject {
      color: #d32f2f;
      font-weight: bold;
    }

    .practice-feedback.hint {
      color: #f57c00;
    }

    .practice-feedback.complete {
      color: #4a90d9;
      font-weight: bold;
      font-size: 1.25rem;
    }

    .score-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .score-bar .bar {
      width: 200px;
      height: 8px;
      background: #eee;
      border-radius: 4px;
      overflow: hidden;
    }

    .score-bar .bar-fill {
      height: 100%;
      background: #4a90d9;
      border-radius: 4px;
      transition: width 0.3s;
    }

  </style>
</head>
<body>
  <h1>Kaku Demo</h1>

  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" data-tab="animation">Animation</button>
      <button class="tab-btn" data-tab="practice">Practice</button>
    </div>

    <!-- Animation Tab -->
    <div class="tab-panel active" id="tab-animation">
      <div class="presets">
        <button onclick="loadCharacter('漢')">漢</button>
        <button onclick="loadCharacter('字')">字</button>
        <button onclick="loadCharacter('学')">学</button>
        <button onclick="loadCharacter('書')">書</button>
        <button onclick="loadCharacter('愛')">愛</button>
      </div>

      <div class="character-input">
        <input type="text" id="charInput" maxlength="1" placeholder="Enter character" value="漢">
        <button onclick="loadFromInput()">Load</button>
      </div>

      <div class="canvas-container">
        <div id="canvas"></div>
      </div>

      <div class="controls">
        <button onclick="kaku?.play()" id="playBtn">Play</button>
        <button onclick="kaku?.pause()" id="pauseBtn">Pause</button>
        <button onclick="kaku?.reset()" id="resetBtn">Reset</button>
        <button onclick="kaku?.previousStroke()" id="prevBtn">&larr; Previous</button>
        <button onclick="kaku?.nextStroke()" id="nextBtn">Next &rarr;</button>
      </div>

      <div class="status">
        <div>State: <strong id="state">idle</strong></div>
        <div>Stroke: <strong id="strokeNum">0</strong> / <strong id="totalStrokes">0</strong></div>
      </div>

      <div class="error" id="error"></div>

      <div class="settings">
        <div class="setting-row">
          <label for="autoplayCheckbox">Autoplay:</label>
          <input type="checkbox" id="autoplayCheckbox" checked>
        </div>
        <div class="setting-row">
          <label for="loopCheckbox">Loop:</label>
          <input type="checkbox" id="loopCheckbox" checked>
        </div>
        <div class="setting-row">
          <label for="speedSlider">Stroke Duration:</label>
          <input type="range" id="speedSlider" min="0.1" max="2" step="0.1" value="0.7">
          <span class="value"><span id="speedValue">0.7</span>s</span>
        </div>
        <div class="setting-row">
          <label for="effectSelect">Stroke Effect:</label>
          <select id="effectSelect">
            <option value="draw" selected>Draw</option>
            <option value="fade">Fade In</option>
            <option value="none">None (instant)</option>
          </select>
        </div>
      </div>

      <h2>Stroke Order Diagram</h2>
      <div class="diagram-container" id="diagram"></div>
    </div>

    <!-- Practice Tab -->
    <div class="tab-panel" id="tab-practice">
      <div class="presets">
        <button onclick="loadPractice('漢')">漢</button>
        <button onclick="loadPractice('字')">字</button>
        <button onclick="loadPractice('学')">学</button>
        <button onclick="loadPractice('書')">書</button>
        <button onclick="loadPractice('愛')">愛</button>
      </div>

      <div class="character-input">
        <input type="text" id="practiceCharInput" maxlength="1" placeholder="Enter character" value="字">
        <button onclick="loadPracticeFromInput()">Load</button>
      </div>

      <div class="canvas-container">
        <div id="practice-canvas"></div>
      </div>

      <div class="settings" style="margin-bottom: 1rem;">
        <div class="setting-row">
          <label for="guideCheckbox">Show guidelines:</label>
          <input type="checkbox" id="guideCheckbox" checked>
        </div>
      </div>

      <div class="controls">
        <button onclick="resetPractice()" id="practiceResetBtn">Reset</button>
        <button onclick="playAllHints()" id="playHintsBtn">Play Hints (debug)</button>
      </div>

      <div class="status">
        <div>Stroke: <strong id="practiceStrokeNum">0</strong> / <strong id="practiceTotalStrokes">0</strong></div>
      </div>

      <div class="practice-feedback" id="practiceFeedback"></div>

      <div class="score-bar">
        <span>Score:</span>
        <div class="bar"><div class="bar-fill" id="practiceScoreBar" style="width: 0%"></div></div>
        <span id="practiceScoreText">-</span>
      </div>

      <div class="error" id="practiceError"></div>
    </div>
  </div>

  <script type="module">
    import { Kaku, KakuDiagram, KanjiVGProvider } from './packages/kaku/src/index.ts';
    import { KakuRen } from './packages/kaku-ren/src/index.ts';

    // --- Tab switching ---
    let practiceLoaded = false;

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');

        // Auto-load practice on first switch to the tab
        if (btn.dataset.tab === 'practice' && !practiceLoaded) {
          practiceLoaded = true;
          const char = document.getElementById('practiceCharInput').value.trim();
          if (char) loadPractice(char);
        }
      });
    });

    // --- Shared ---
    const provider = new KanjiVGProvider({
      basePath: 'https://raw.githubusercontent.com/KanjiVG/kanjivg/master/kanji',
    });

    // Compute canvas size to fit container, max 300px
    function getCanvasSize() {
      const container = document.querySelector('.container');
      const style = getComputedStyle(container);
      const available = container.clientWidth - parseFloat(style.paddingLeft) - parseFloat(style.paddingRight);
      return Math.min(300, available);
    }

    // ==============================
    // Animation Tab
    // ==============================
    window.kaku = null;
    window.diagram = null;
    window.strokeDuration = 0.7;
    window.strokeEffect = 'draw';
    window.autoplay = true;
    window.loop = true;

    window.diagram = new KakuDiagram({
      provider,
      container: document.getElementById('diagram'),
      width: 80,
      height: 80,
      strokeColor: '#333',
      strokeWidth: 3,
      showGrid: true,
      gridColor: '#e0e0e0',
    });

    function updateStatus() {
      document.getElementById('state').textContent = kaku?.state || 'idle';
      document.getElementById('strokeNum').textContent = kaku?.currentStroke || 0;
      document.getElementById('totalStrokes').textContent = kaku?.totalStrokes || 0;
    }

    window.loadCharacter = async function(char) {
      document.getElementById('error').textContent = '';
      document.getElementById('charInput').value = char;

      if (window.kaku) {
        window.kaku.dispose();
      }

      try {
        const size = getCanvasSize();
        window.kaku = new Kaku({
          provider,
          container: document.getElementById('canvas'),
          width: size,
          height: size,
          strokeColor: '#333',
          strokeWidth: 4,
          showGrid: true,
          gridColor: '#e0e0e0',
          animation: {
            strokeDuration: window.strokeDuration,
            strokeEffect: window.strokeEffect,
            autoplay: window.autoplay,
            loop: window.loop,
            loopDelay: 1
          }
        });

        kaku.on('start', updateStatus);
        kaku.on('strokeStart', updateStatus);
        kaku.on('strokeComplete', updateStatus);
        kaku.on('complete', updateStatus);
        kaku.on('pause', updateStatus);
        kaku.on('resume', updateStatus);
        kaku.on('reset', updateStatus);

        await kaku.load(char);
        updateStatus();

        await window.diagram.load(char);

      } catch (err) {
        document.getElementById('error').textContent = err.message;
        console.error(err);
      }
    };

    window.loadFromInput = function() {
      const char = document.getElementById('charInput').value.trim();
      if (char) loadCharacter(char);
    };

    document.getElementById('charInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loadFromInput();
    });

    document.getElementById('speedSlider').addEventListener('input', (e) => {
      window.strokeDuration = parseFloat(e.target.value);
      document.getElementById('speedValue').textContent = window.strokeDuration.toFixed(1);
      const char = document.getElementById('charInput').value.trim();
      if (char) loadCharacter(char);
    });

    document.getElementById('effectSelect').addEventListener('change', (e) => {
      window.strokeEffect = e.target.value;
      const char = document.getElementById('charInput').value.trim();
      if (char) loadCharacter(char);
    });

    document.getElementById('autoplayCheckbox').addEventListener('change', (e) => {
      window.autoplay = e.target.checked;
      const char = document.getElementById('charInput').value.trim();
      if (char) loadCharacter(char);
    });

    document.getElementById('loopCheckbox').addEventListener('change', (e) => {
      window.loop = e.target.checked;
      const char = document.getElementById('charInput').value.trim();
      if (char) loadCharacter(char);
    });

    // Load initial character
    loadCharacter('漢');

    // ==============================
    // Practice Tab
    // ==============================
    let practiceKaku = null;
    let practiceRen = null;

    const feedbackEl = document.getElementById('practiceFeedback');
    const scoreBar = document.getElementById('practiceScoreBar');
    const scoreText = document.getElementById('practiceScoreText');

    function updatePracticeStatus() {
      document.getElementById('practiceStrokeNum').textContent = practiceRen?.currentStroke ?? 0;
      document.getElementById('practiceTotalStrokes').textContent = practiceRen?.totalStrokes ?? 0;
    }

    function updateScoreDisplay() {
      const avg = practiceRen?.averageScore ?? 0;
      const pct = Math.round(avg * 100);
      scoreBar.style.width = pct + '%';
      scoreText.textContent = practiceRen?.allScores.length > 0 ? pct + '%' : '-';
    }

    function showFeedback(text, className) {
      feedbackEl.textContent = text;
      feedbackEl.className = 'practice-feedback ' + className;
    }

    window.loadPractice = async function(char) {
      document.getElementById('practiceError').textContent = '';
      document.getElementById('practiceCharInput').value = char;
      feedbackEl.textContent = 'Draw the first stroke!';
      feedbackEl.className = 'practice-feedback';
      scoreBar.style.width = '0%';
      scoreText.textContent = '-';

      // Dispose previous
      if (practiceRen) {
        practiceRen.dispose();
        practiceRen = null;
      }
      if (practiceKaku) {
        practiceKaku.dispose();
        practiceKaku = null;
      }

      try {
        // Create a Kaku instance with dark strokes — accepted strokes appear here
        const size = getCanvasSize();
        practiceKaku = new Kaku({
          provider,
          container: document.getElementById('practice-canvas'),
          width: size,
          height: size,
          strokeColor: '#333',
          strokeWidth: 4,
          showGrid: true,
          gridColor: '#e0e0e0',
          animation: {
            autoplay: false,
            strokeEffect: 'none',
            strokeDuration: 0,
          }
        });

        await practiceKaku.load(char);

        // Overlay KakuRen for practice (guide + stroke width computed automatically)
        practiceRen = new KakuRen({
          kaku: practiceKaku,
          container: document.getElementById('practice-canvas'),
          width: size,
          height: size,
          strokeColor: '#333',
          showGuide: document.getElementById('guideCheckbox').checked,
          onAccept(index, result) {
            const pct = Math.round(result.score * 100);
            showFeedback(`Stroke ${index + 1} accepted (${pct}%)`, 'accept');
            updatePracticeStatus();
            updateScoreDisplay();
          },
          onReject(index, result) {
            const reason = result.rejection === 'wrong-direction' ? ' (wrong direction)' :
                           result.rejection === 'too-short' ? ' (too short)' :
                           result.rejection === 'too-far' ? ' (too far off)' : '';
            showFeedback(`Try again${reason}`, 'reject');
            updatePracticeStatus();
          },
          onComplete(avgScore) {
            const pct = Math.round(avgScore * 100);
            showFeedback(`Complete! Average score: ${pct}%`, 'complete');
            updatePracticeStatus();
            updateScoreDisplay();
          },
        });

        updatePracticeStatus();

      } catch (err) {
        document.getElementById('practiceError').textContent = err.message;
        console.error(err);
      }
    };

    window.loadPracticeFromInput = function() {
      const char = document.getElementById('practiceCharInput').value.trim();
      if (char) loadPractice(char);
    };

    window.resetPractice = function() {
      if (practiceRen) {
        practiceRen.reset();
        feedbackEl.textContent = 'Draw the first stroke!';
        feedbackEl.className = 'practice-feedback';
        scoreBar.style.width = '0%';
        scoreText.textContent = '-';
        updatePracticeStatus();
      }
    };

    window.playAllHints = async function() {
      if (practiceRen) {
        showFeedback('Playing all stroke hints...', 'hint');
        await practiceRen.playHints();
        showFeedback('Hints complete. Draw the first stroke!', '');
      }
    };

    document.getElementById('guideCheckbox').addEventListener('change', (e) => {
      if (practiceRen) {
        practiceRen.guide = e.target.checked;
      }
    });

    document.getElementById('practiceCharInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loadPracticeFromInput();
    });
  </script>
</body>
</html>
