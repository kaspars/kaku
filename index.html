<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaku - Stroke Animation Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    .container {
      background: white;
      border-radius: 8px;
      padding: 2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .character-input {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .character-input input {
      flex: 1;
      padding: 0.75rem;
      font-size: 1.5rem;
      border: 2px solid #ddd;
      border-radius: 4px;
      text-align: center;
    }

    .character-input button {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .character-input button:hover {
      background: #357abd;
    }

    .canvas-container {
      display: flex;
      justify-content: center;
      margin: 2rem 0;
      background: white;
      border: 1px solid #eee;
      border-radius: 4px;
    }

    #canvas {
      display: block;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .controls button {
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      background: #666;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .controls button:hover {
      background: #555;
    }

    .controls button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .status {
      text-align: center;
      margin-top: 1.5rem;
      color: #666;
      font-size: 0.9rem;
    }

    .status strong {
      color: #333;
    }

    .presets {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .presets button {
      padding: 0.5rem 1rem;
      font-size: 1.25rem;
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
    }

    .presets button:hover {
      background: #e0e0e0;
    }

    .error {
      color: #d32f2f;
      text-align: center;
      margin-top: 1rem;
    }

    .settings {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #eee;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .setting-row label {
      color: #666;
      font-size: 0.9rem;
      min-width: 120px;
      text-align: right;
    }

    .setting-row input[type="range"] {
      width: 150px;
    }

    .setting-row .value {
      min-width: 50px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>
  <h1>Kaku - Stroke Animation</h1>

  <div class="container">
    <div class="presets">
      <button onclick="loadCharacter('漢')">漢</button>
      <button onclick="loadCharacter('字')">字</button>
      <button onclick="loadCharacter('学')">学</button>
      <button onclick="loadCharacter('書')">書</button>
      <button onclick="loadCharacter('愛')">愛</button>
    </div>

    <div class="character-input">
      <input type="text" id="charInput" maxlength="1" placeholder="Enter character" value="漢">
      <button onclick="loadFromInput()">Load</button>
    </div>

    <div class="canvas-container">
      <div id="canvas"></div>
    </div>

    <div class="controls">
      <button onclick="kaku?.play()" id="playBtn">Play</button>
      <button onclick="kaku?.pause()" id="pauseBtn">Pause</button>
      <button onclick="kaku?.reset()" id="resetBtn">Reset</button>
      <button onclick="kaku?.previousStroke()" id="prevBtn">← Previous</button>
      <button onclick="kaku?.nextStroke()" id="nextBtn">Next →</button>
    </div>

    <div class="status">
      <div>State: <strong id="state">idle</strong></div>
      <div>Stroke: <strong id="strokeNum">0</strong> / <strong id="totalStrokes">0</strong></div>
    </div>

    <div class="error" id="error"></div>

    <div class="settings">
      <div class="setting-row">
        <label for="speedSlider">Stroke Duration:</label>
        <input type="range" id="speedSlider" min="0.1" max="2" step="0.1" value="0.6">
        <span class="value"><span id="speedValue">0.6</span>s</span>
      </div>
    </div>
  </div>

  <script type="module">
    import { Kaku, KanjiVGProvider } from './src/index.ts';

    // Make kaku available globally for button handlers
    window.kaku = null;
    window.strokeDuration = 0.6;

    // Create provider - uses local kanjivg files
    const provider = new KanjiVGProvider({
      basePath: '/kanjivg'
    });

    function updateStatus() {
      document.getElementById('state').textContent = kaku?.state || 'idle';
      document.getElementById('strokeNum').textContent = kaku?.currentStroke || 0;
      document.getElementById('totalStrokes').textContent = kaku?.totalStrokes || 0;
    }

    window.loadCharacter = async function(char) {
      document.getElementById('error').textContent = '';
      document.getElementById('charInput').value = char;

      // Dispose previous instance
      if (window.kaku) {
        window.kaku.dispose();
      }

      try {
        window.kaku = new Kaku({
          provider,
          container: document.getElementById('canvas'),
          width: 300,
          height: 300,
          strokeColor: '#333',
          strokeWidth: 4,
          showGrid: true,
          gridColor: '#e0e0e0',
          animation: {
            strokeDuration: window.strokeDuration,
            loop: false
          }
        });

        // Subscribe to events
        kaku.on('start', updateStatus);
        kaku.on('strokeStart', updateStatus);
        kaku.on('strokeComplete', updateStatus);
        kaku.on('complete', updateStatus);
        kaku.on('pause', updateStatus);
        kaku.on('resume', updateStatus);
        kaku.on('reset', updateStatus);

        await kaku.load(char);
        updateStatus();

      } catch (err) {
        document.getElementById('error').textContent = err.message;
        console.error(err);
      }
    };

    window.loadFromInput = function() {
      const char = document.getElementById('charInput').value.trim();
      if (char) {
        loadCharacter(char);
      }
    };

    // Handle Enter key in input
    document.getElementById('charInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        loadFromInput();
      }
    });

    // Slider event handler
    document.getElementById('speedSlider').addEventListener('input', (e) => {
      window.strokeDuration = parseFloat(e.target.value);
      document.getElementById('speedValue').textContent = window.strokeDuration.toFixed(1);

      // Reload current character to apply new duration
      const char = document.getElementById('charInput').value.trim();
      if (char) {
        loadCharacter(char);
      }
    });

    // Load initial character
    loadCharacter('漢');
  </script>
</body>
</html>
